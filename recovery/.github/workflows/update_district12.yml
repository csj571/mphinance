name: Weekly District 12 Meeting Update

on:
  schedule:
    # Run every Sunday at 05:00 UTC
    - cron: '0 5 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-meetings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scripts/scrape_district12.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Ghost Scraper"
          git config --global user.email "sam@mphinance.com"
          git add docs/district12.html landing/blog/blog_entries.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "👻 Weekly District 12 Sync" && git push)
