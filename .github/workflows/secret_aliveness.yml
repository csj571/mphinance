name: Secret Aliveness Check

# Weekly probe of every external service behind a configured secret.
# Catches dead hosts, expired keys, and URL drift BEFORE they break a
# scheduled run (this exists because TICKERTRACE_API_BASE silently
# pointed at a dead host with cert mismatch for an unknown duration).
#
# Each probe is a minimal read-only call. No writes, no side effects.
# Failures open or comment on a 'pipeline-failure' labeled issue.

on:
  schedule:
    # Sunday 08:00 UTC — late enough that timezone-spread weekly
    # maintenance jobs are unlikely to be churning
    - cron: '0 8 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Probe all secrets
        id: probe
        env:
          TICKERTRACE_API_BASE: ${{ secrets.TICKERTRACE_API_BASE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
        run: |
          set +e  # don't bail on first failure — probe all, then report
          RESULTS=""
          FAILURES=0

          # Default UA so endpoints like Substack don't 403 bare curl.
          UA="mphinance-secret-aliveness/1.0 (+https://github.com/mphinance/mphinance)"

          check() {
            local label="$1"; shift
            local url="$1"; shift
            local out
            out=$(curl -fsS --max-time 15 -A "$UA" -o /dev/null -w "%{http_code} %{time_total}s" "$@" "$url" 2>&1)
            local rc=$?
            if [ $rc -eq 0 ]; then
              RESULTS="${RESULTS}- ✅ ${label}: ${out}"$'\n'
            else
              RESULTS="${RESULTS}- ❌ ${label}: rc=${rc} ${out}"$'\n'
              FAILURES=$((FAILURES + 1))
            fi
          }

          echo "## Secret aliveness — $(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # ── TickerTrace ──
          if [ -n "$TICKERTRACE_API_BASE" ]; then
            check "TickerTrace ($TICKERTRACE_API_BASE/api/v1/stats)" \
              "$TICKERTRACE_API_BASE/api/v1/stats"
          else
            RESULTS="${RESULTS}- ⚠️ TickerTrace: secret TICKERTRACE_API_BASE not set"$'\n'
          fi

          # ── Gemini API ──
          if [ -n "$GEMINI_API_KEY" ]; then
            check "Gemini API (models list)" \
              "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY"
          else
            RESULTS="${RESULTS}- ⚠️ Gemini: secret GEMINI_API_KEY not set"$'\n'
          fi

          # ── Tradier ──
          if [ -n "$TRADIER_API_KEY" ]; then
            check "Tradier (markets clock)" \
              "https://api.tradier.com/v1/markets/clock" \
              -H "Authorization: Bearer $TRADIER_API_KEY" \
              -H "Accept: application/json"
          else
            RESULTS="${RESULTS}- ⚠️ Tradier: secret TRADIER_API_KEY not set"$'\n'
          fi

          # ── Substack RSS (no secret needed, but it's a pipeline dep) ──
          check "Substack feed (mphinance.substack.com/feed)" \
            "https://mphinance.substack.com/feed"

          # ── GitHub Pages (canary that the public site is up) ──
          check "GH Pages (mphinance.github.io/mphinance/)" \
            "https://mphinance.github.io/mphinance/"

          echo "$RESULTS" >> "$GITHUB_STEP_SUMMARY"
          echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"
          {
            echo "results<<EOF"
            echo "$RESULTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $FAILURES -gt 0 ]; then
            echo "::warning title=$FAILURES secret probe(s) failed::See workflow summary"
            exit 1
          fi

      - name: Open or update pipeline-failure issue
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULTS: ${{ steps.probe.outputs.results }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          TITLE="[pipeline-failure] Secret Aliveness Check"
          BODY=$(cat <<EOF
          One or more external dependencies behind a configured secret are unreachable.

          **Run:** $RUN_URL
          **Results:**

          $RESULTS

          ---
          See [docs/runbooks/pipeline-failure.md](../blob/main/docs/runbooks/pipeline-failure.md) — likely a dead host or rotated credential.
          EOF
          )
          EXISTING=$(gh issue list --repo "${{ github.repository }}" \
            --label "pipeline-failure" --state open \
            --search "Secret Aliveness in:title" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --label "pipeline-failure" \
              --body "$BODY"
          fi
