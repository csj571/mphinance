name: Daily Alpha Dossier

on:
  schedule:
    # Mon-Fri at 5:00AM CST (targeting 10:00 UTC to compensate for GH Actions jitter)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-dossier
  cancel-in-progress: false

jobs:
  generate:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt feedparser

      - name: Preflight — external API reachability
        # Best-effort check; failures don't abort the run (the pipeline
        # degrades gracefully when TickerTrace is down) but the result
        # is visible in the workflow summary.
        continue-on-error: true
        run: |
          echo "## External dependency preflight" >> "$GITHUB_STEP_SUMMARY"
          if curl -fsS --max-time 10 https://api.tickertrace.pro/api/v1/stats > /tmp/tt_stats.json; then
            echo "- TickerTrace: ✅ reachable ($(jq -r '.fundsTracked' /tmp/tt_stats.json) funds tracked)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- TickerTrace: ❌ unreachable — dossier will degrade institutional section" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=TickerTrace preflight failed::api.tickertrace.pro not reachable; institutional data will be empty"
          fi

      - name: Create secrets.env for Substack
        run: |
          echo "SUBSTACK_SID=${{ secrets.SUBSTACK_SID }}" > secrets.env
          echo "SUBSTACK_PUB_URL=${{ secrets.SUBSTACK_PUB_URL }}" >> secrets.env

      - name: Generate Alpha Dossier
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TICKERTRACE_API_BASE: ${{ secrets.TICKERTRACE_API_BASE }}
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
        run: python -m dossier.generate --no-pdf

      - name: Manage Substack Drafts
        run: |
          mkdir -p docs/substack/dossier
          python3 scripts/substack_draft_manager.py check || echo "[WARN] Draft check failed"
          python3 scripts/substack_draft_manager.py status

      - name: Commit & Push
        run: |
          git config --local user.email "ghost@mphinance.com"
          git config --local user.name "Ghost Alpha Pipeline"
          git add docs/ dossier/persistence/data/
          git diff --staged --quiet || git commit -m "📊 Alpha Dossier $(date +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
